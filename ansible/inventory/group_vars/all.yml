---
# Cross-environment defaults. Override per environment with --extra-vars or env-specific
# group_vars files (e.g. group_vars/prod.yml).

env: dev
app_namespace: spidersilk
release_name: spidersilk

# Image
image_repository: docker.io/ahmedsaeed/spidersilk-csv-app
image_tag: "0.1.0"

# App config — exposed in the rendered Helm values.yaml
app:
  environment: "{{ env }}"
  log_level: INFO
  s3_prefix: "uploads/"
  max_upload_bytes: 10485760  # 10 MiB

s3:
  bucket: "spidersilk-csv-archive-{{ env }}"
  region: us-east-1

replicas: 2

autoscaling:
  min: 2
  max: 10
  cpu_target: 70

service_account_role_arn: ""   # set per env for IRSA, e.g. via group_vars/prod.yml

chart_path: "{{ playbook_dir }}/../helm/spidersilk"
rendered_values_path: "/tmp/spidersilk-values-{{ env }}.yaml"
