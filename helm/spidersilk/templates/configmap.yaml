apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spidersilk.fullname" . }}-config
  labels: {{- include "spidersilk.labels" . | nindent 4 }}
data:
  # App-level config consumed via envFrom in the app container.
  SPIDERSILK_ENVIRONMENT: {{ .Values.config.environment | quote }}
  SPIDERSILK_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  SPIDERSILK_S3_BUCKET: {{ .Values.s3.bucket | quote }}
  SPIDERSILK_AWS_REGION: {{ .Values.s3.region | quote }}
  SPIDERSILK_S3_PREFIX: {{ .Values.config.s3Prefix | quote }}
  SPIDERSILK_MAX_UPLOAD_BYTES: {{ .Values.config.maxUploadBytes | quote }}
  SPIDERSILK_PUBLIC_DIR: "/public"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "spidersilk.fullname" . }}-nginx
  labels: {{- include "spidersilk.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /tmp/nginx-error.log warn;
    pid        /tmp/nginx.pid;

    events { worker_connections  1024; }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile        on;
      keepalive_timeout  65;
      client_max_body_size 16m;

      access_log /dev/stdout;
      proxy_temp_path     /tmp/proxy_temp;
      client_body_temp_path /tmp/client_temp;
      fastcgi_temp_path   /tmp/fastcgi_temp;
      uwsgi_temp_path     /tmp/uwsgi_temp;
      scgi_temp_path      /tmp/scgi_temp;

      upstream app { server 127.0.0.1:8000; }

      server {
        listen 8080;
        server_name _;

        location /static/ {
          alias /public/static/;
          access_log off;
          expires 1h;
          add_header Cache-Control "public";
        }

        location /healthz { proxy_pass http://app/healthz; }

        location / {
          proxy_pass         http://app;
          proxy_http_version 1.1;
          proxy_set_header   Host              $host;
          proxy_set_header   X-Real-IP         $remote_addr;
          proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $scheme;
          proxy_read_timeout 30s;
        }
      }
    }
