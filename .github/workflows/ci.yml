name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  helm:
    name: Helm (lint + template + kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: helm lint
        run: helm lint helm/spidersilk
      - name: helm template
        run: helm template spidersilk helm/spidersilk -n spidersilk > /tmp/rendered.yaml
      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kc.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/
      - name: kubeconform
        run: kubeconform -strict -schema-location default -summary /tmp/rendered.yaml

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  ansible:
    name: Ansible (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install "ansible-core==2.17.*" "ansible-lint==24.9.*"
      - run: ansible-lint ansible/

  trivy:
    name: Trivy (filesystem + Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # warn but don't fail until baseline is tuned
